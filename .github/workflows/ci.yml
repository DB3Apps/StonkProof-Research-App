name: Node.js CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    # --- ADD THESE TWO LINES ---
      # --- ADD THESE TWO LINES ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # ---------------------------
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' 
      - run: npm install
      - run: npm run build
