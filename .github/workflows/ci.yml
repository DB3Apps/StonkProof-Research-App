concurrency:
  name: Build and Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY}}
    steps:
      - uses: actions/checkout@v4
    
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          # This pulls the value from the secret you just set in GitHub
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
