name: Node.js CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    # --- ADD THESE TWO LINES ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # ---------------------------
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20' # You can keep this as '20' or update to '22' or '24' if needed
      - run: npm install
      - run: npm run build
