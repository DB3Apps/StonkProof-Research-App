name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '37 2 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: 'javascript-typescript'
          build-mode: 'none'
        - language: 'java-kotlin'
          build-mode: 'autobuild'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Node.js
      if: matrix.language == 'java-kotlin' || matrix.language == 'javascript-typescript'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies and sync Capacitor
      run: |
        npm install
        npm run build
        if [ "${{ matrix.language }}" == "java-kotlin" ]; then
          chmod +x android/gradlew
          npx cap sync android
        fi

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended,security-and-quality
        # Exclude node_modules from analysis
        config: |
          paths-ignore:
            - 'node_modules/**'

    - name: Autobuild
      if: matrix.language == 'java-kotlin' && matrix.build-mode == 'autobuild'
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
        upload: true
